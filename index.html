<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>ID CARD PKKMB</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url("foto1.jpg") center/cover no-repeat; /* ganti dengan foto background */
    }
    .card {
      background: rgba(255,255, 255, 0.40);
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      padding: 30px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      animation: fadeIn 1.5s ease;
      position: relative;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 5px solid #fff;
      margin-top: -80px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transition: transform 0.5s;
    }
    .profile-pic:hover {
      transform: rotateY(360deg) scale(1.05); /* efek 3D berputar */
    }
    .card h2 {
      margin: 10px 0;
      color: #2c3e50;
    }
    .card p {
      margin: 5px 0;
      font-size: 15px;
      color: #555;
    }
    .social {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    .social a {
      width: 45px;
      height: 45px;
      background: rgba(255, 255, 255, 0.40);
      color: #fff;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      transition: transform 0.3s, background 0.3s;
    }
    .social a:hover {
      transform: scale(1.1);
      background:  linear-gradient(90deg, #2980b9, #3498db);
    }
    .intro-btn {
      display: inline-block;
      margin: 20px 0;
      padding: 12px 20px;
      background:  linear-gradient(90deg, #ff4d4d, #e60000) ;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
      transition: transform 0.3s, background-position 0.3s;
    }
    .intro-btn:hover {
      transform: scale(1.05);
      background:  linear-gradient(90deg, #ff6666, #cc0000);
      background-position: right center
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="profile-pic" src="foto2.png" alt="Foto Profil">
      <h2>Sa’id Abdul Aziz</h2>
      <p><strong>Nickname:</strong> Said</p>
      <p><strong>Study program:</strong> Informatics</p>
      <p><strong>Faculty:</strong> Faculty of Informatics</p>
      <p><strong>Region of origin:</strong> Soreang </p>
      <p><strong>Group number:</strong> 07</p>

      <div class="social-section">
        <h3>Social Media</h3>
        <div class="social">
          <a href="https://instagram.com/saidazizzy"><i class="fab fa-instagram"></i></a>
          <a href="https://www.linkedin.com/in/sa-id-6037033b8"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>

      <a class="intro-btn" href="https://youtu.be/VIDEO_ID" target="_blank">🎥 See introduce myself </a>
    </div>
  </div>
</body>
</html>
